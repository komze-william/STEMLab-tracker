            <div className="join-white-card">
              <div className="join-section-title">Almost there — fill your details</div>
              <p style={{fontSize:13,color:'#666',marginBottom:14}}>Your details are sent directly to our team via WhatsApp. Payment confirmed manually.</p>
              <div className="join-form-field">
                <label className="join-form-label">Your Full Name *</label>
                <input className="join-form-input" type="text" placeholder="e.g. Marie Claire Ateba" value={studentName} onChange={e=>{setStudentName(e.target.value);setErr('');}} />
              </div>
              <div className="join-form-field">
                <label className="join-form-label">Your WhatsApp Number *</label>
                <input className="join-form-input" type="text" placeholder="e.g. 6XXXXXXXX" value={studentPhone} onChange={e=>{setStudentPhone(e.target.value);setErr('');}} />
              </div>
              <div className="join-form-field">
                <label className="join-form-label">Course you want *</label>
                <select className="join-form-select" value={selectedCourse} onChange={e=>setSelectedCourse(e.target.value)}>
                  {activeCourses.map(c=><option key={c.id} value={c.id}>{c.fullName} — {c.semesterFee.toLocaleString()} FCFA</option>)}
                </select>
              </div>
              {err && <div className="join-error">{err}</div>}
              <button className="join-cta" onClick={handleJoin}>JOIN NOW — Send Request via WhatsApp</button>
            </div>

            <div className="join-footer">
              STEMLab — Independent academic platform.<br/>
              Payment confirmed manually via MTN/Orange MoMo. Not affiliated with any institution.
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP — Root component
// Manages all state, routing, session checks, and data handlers
// This is the central hub that connects everything together
// ============================================================
function App() {
  // ── Persistent state (survives page refresh) ──
  const [ambassadors, setAmbassadors] = useLocalStorage('stemlab_v2_ambassadors', []);
  const [courses, setCourses] = useLocalStorage('stemlab_v2_courses', INITIAL_COURSES);
  const [auditLog, setAuditLog] = useLocalStorage('stemlab_audit', []);
  const [leaderboardVisible, setLeaderboardVisible] = useLocalStorage('stemlab_leaderboard', true);
  const [currentSemester, setCurrentSemester] = useLocalStorage('stemlab_semester', {
    id: 'SEM-2025-S1', label: 'Semester 1 — 2025/2026',
    startDate: today(), status: 'active'
  });
  const [semesterHistory, setSemesterHistory] = useLocalStorage('stemlab_history', []);
  const [visits, setVisits] = useLocalStorage('stemlab_visits', []);
  const [lastBackup, setLastBackup] = useLocalStorage('stemlab_last_backup', null);

  // ── Session-only state (resets on tab close) ──
  const [founderLoggedIn, setFounderLoggedIn] = useState(() => {
    try { const s = JSON.parse(sessionStorage.getItem('stemlab_session')||'{}'); return !!(s.token && s.expiresAt > Date.now()); } catch { return false; }
  });
  const [currentUser, setCurrentUser] = useState(() => {
    try {
      const s = JSON.parse(sessionStorage.getItem('stemlab_amb_session')||'{}');
      if (!s.ambassadorId || s.expiresAt <= Date.now()) return null;
      return null; // Will be resolved after ambassadors load
    } catch { return null; }
  });
  const [mode, setMode] = useState('founder'); // 'founder' | 'ambassador'
  const [view, setView] = useState('dashboard');
  const [hashData, setHashData] = useState(parseHash());
  const [sessionMins, setSessionMins] = useState(0);

  // Resolve ambassador session after ambassadors load
  useEffect(() => {
    if (ambassadors.length === 0 || currentUser) return;
    try {
      const s = JSON.parse(sessionStorage.getItem('stemlab_amb_session')||'{}');
      if (s.ambassadorId && s.expiresAt > Date.now()) {
        const amb = ambassadors.find(a => a.id === s.ambassadorId);
        if (amb) { setCurrentUser(amb); setMode('ambassador'); }
      }
    } catch {}
  }, [ambassadors]);

  // Hash routing — listens for URL changes
  useEffect(() => {
    const handler = () => setHashData(parseHash());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  // Session timer for founder
  useEffect(() => {
    if (!founderLoggedIn) return;
    const tick = () => {
      try {
        const s = JSON.parse(sessionStorage.getItem('stemlab_session')||'{}');
        if (!s.expiresAt || s.expiresAt <= Date.now()) { handleLogout(); return; }
        setSessionMins(Math.max(0, Math.floor((s.expiresAt - Date.now()) / 60000)));
      } catch {}
    };
    tick();
    const iv = setInterval(tick, 60000);
    return () => clearInterval(iv);
  }, [founderLoggedIn]);

  // Audit helper — adds entry to the audit log
  function audit(action, desc) {
    setAuditLog(prev => [createAuditEntry(action, desc), ...prev].slice(0, 500));
  }

  // ── DATA HANDLERS ──

  function handleAddAmbassador(ambassador) {
    setAmbassadors(prev => [...prev, ambassador]);
    audit('ADD', `Ambassador ${ambassador.name} added to ${ambassador.course} slot ${ambassador.slot} with code ${ambassador.code}`);
    // Navigate to dashboard so the founder immediately sees the new card
    setView('dashboard');
  }

  function handleUpdateAmbassador(updated) {
    const prev = ambassadors.find(a => a.id === updated.id);
    if (prev) {
      if (updated.subscribers > prev.subscribers) {
        const added = updated.subscribers - prev.subscribers;
        audit('RECORD', `Recorded +${added} subscriber${added!==1?'s':''} for ${updated.name}. Total: ${updated.subscribers}`);
      }
      if (updated.paidOut > prev.paidOut) {
        const paid = updated.paidOut - prev.paidOut;
        audit('PAYMENT', `Paid ${fmt(paid)} to ${updated.name}. Cumulative paid: ${fmt(updated.paidOut)}`);
      }
      if (updated.active !== prev.active) {
        audit('STATUS', `${updated.name} ${updated.active ? 'reactivated' : 'deactivated'}`);
      }
    }
    setAmbassadors(prev => prev.map(a => a.id === updated.id ? updated : a));
  }

  function handleOffboardAmbassador(ambassador, reason) {
    const updated = { ...ambassador, active: false, vaultAccess: false, status: 'offboarded', offboardedAt: today(), offboardReason: reason };
    setAmbassadors(prev => prev.map(a => a.id === ambassador.id ? updated : a));
    audit('STATUS', `${ambassador.name} removed. Reason: ${reason}`);
  }

  function handleUpdateCourse(updated) {
    setCourses(prev => prev.map(c => c.id === updated.id ? updated : c));
    audit('COURSE', `Course ${updated.id} ${updated.active ? 'activated' : 'deactivated'}`);
  }

  function handleAddCourse(newCourse) {
    setCourses(prev => [...prev, newCourse]);
    audit('COURSE', `New course added: ${newCourse.fullName}`);
  }

  function handleFreezeSemester() {
    setCurrentSemester(prev => ({ ...prev, status: 'frozen' }));
    audit('SEMESTER', `Semester ${currentSemester.label} frozen`);
  }

  async function handleResetSemester(decisions, replaceData, newLabel) {
    // Archive current semester data into each ambassador's semesterRecords
    const archived = ambassadors.map(a => ({
      ...a,
      semesterRecords: [...(a.semesterRecords || []), {
        semesterId: currentSemester.id, semesterLabel: currentSemester.label,
        subscribersRecruited: a.subscribers, commissionEarned: calcCommission(a.subscribers),
        totalPaid: a.paidOut, titleAchieved: getTitle(a.subscribers).label, status: 'completed'
      }]
    }));

    // Process each decision
    let updated = archived.map(a => {
      const dec = decisions[a.id];
      if (!dec || !a.active) return a;
      if (dec === 'continue') return { ...a, subscribers: 0, paidOut: 0, history: [], payments: [] };
      if (dec === 'remove') return { ...a, active: false, status: 'removed' };
      if (dec === 'replace') {
        const rd = replaceData[a.id] || {};
        if (rd.name) {
          // Create new ambassador in same slot
          const newCode = generateCode(rd.name, a.course);
          const newPin = String(Math.floor(1000 + Math.random() * 9000));
          hashText(newPin).then(hp => {
            const newAmb = { id: Date.now(), name: rd.name.trim(), course: a.course, slot: a.slot, code: newCode, pin: hp,
              subscribers: 0, paidOut: 0, active: true, vaultAccess: true, joinDate: today(), momoNumber: rd.momo || '',
              history: [], payments: [], semesterRecords: [], noShowFlaggedAt: null, status: 'active' };
            setAmbassadors(p => [...p, newAmb]);
          });
        }
        return { ...a, active: false, status: 'replaced', subscribers: 0, paidOut: 0 };
      }
      return a;
    });

    setAmbassadors(updated);
    setSemesterHistory(prev => [...prev, { id: currentSemester.id, label: currentSemester.label, archivedDate: today(), ambassadorCount: ambassadors.filter(a=>a.active).length }]);
    setCurrentSemester({ id: 'SEM-' + Date.now(), label: newLabel, startDate: today(), status: 'active' });
    audit('SEMESTER', `Semester reset. New semester: ${newLabel}`);
  }

  function handleImport(data) {
    if (data.ambassadors) setAmbassadors(data.ambassadors);
    if (data.courses) setCourses(data.courses);
    if (data.auditLog) setAuditLog(data.auditLog);
    if (data.currentSemester) setCurrentSemester(data.currentSemester);
    if (data.semesterHistory) setSemesterHistory(data.semesterHistory);
  }

  function handleLogout() {
    sessionStorage.removeItem('stemlab_session');
    setFounderLoggedIn(false);
  }

  function handleAmbLogout() {
    sessionStorage.removeItem('stemlab_amb_session');
    setCurrentUser(null);
    setMode('founder');
  }

  function handleFounderLogin() {
    setFounderLoggedIn(true);
  }

  function handleAmbLogin(amb) {
    setCurrentUser(amb);
    setMode('ambassador');
  }

  // ── ROUTING ──

  // Public join page (hash route)
  if (hashData.page === 'join') {
    return <JoinPage hashData={hashData} courses={courses} visits={visits} setVisits={setVisits} />;
  }

  // Ambassador portal
  if (mode === 'ambassador') {
    if (!currentUser) return <AmbassadorLogin ambassadors={ambassadors} onLogin={handleAmbLogin} onBack={()=>setMode('founder')} />;
    // Sync currentUser with latest data
    const freshUser = ambassadors.find(a => a.id === currentUser.id) || currentUser;
    return <AmbassadorPortal currentUser={freshUser} ambassadors={ambassadors} courses={courses} onLogout={handleAmbLogout} leaderboardVisible={leaderboardVisible} />;
  }

  // Founder flow
  if (!founderLoggedIn) {
    return <FounderLogin onLogin={handleFounderLogin} onSwitchToAmbassador={()=>setMode('ambassador')} />;
  }

  // ── FOUNDER DASHBOARD ──
  return (
    <div>
      <TopBar view={view} onNav={setView} onLogout={handleLogout} sessionMins={sessionMins} />
      <SyncBanner />

      <div className="page">

        {/* DASHBOARD — Main view with stats, alerts, ambassador list */}
        {view === 'dashboard' && (
          <div>
            <AlertPanel ambassadors={ambassadors} courses={courses} visits={visits} lastBackup={lastBackup} />
            <StatsBar ambassadors={ambassadors} />
            <AmbassadorList ambassadors={ambassadors} visits={visits} onUpdate={handleUpdateAmbassador} onOffboard={handleOffboardAmbassador} />
          </div>
        )}

        {/* ADD AMBASSADOR */}
        {view === 'add' && (
          <AddAmbassadorForm courses={courses} ambassadors={ambassadors} onAdd={handleAddAmbassador} />
        )}

        {/* CODES VIEW */}
        {view === 'codes' && (
          <CodesView ambassadors={ambassadors} courses={courses} />
        )}

        {/* COURSES */}
        {view === 'courses' && (
          <CoursesView courses={courses} ambassadors={ambassadors} onUpdateCourse={handleUpdateCourse} onAddCourse={handleAddCourse} />
        )}

        {/* LEADERBOARD */}
        {view === 'leaderboard' && (
          <Leaderboard ambassadors={ambassadors} currentAmbId={null} isFounder={true}
            visible={leaderboardVisible} onToggle={()=>setLeaderboardVisible(p=>!p)} />
        )}

        {/* AUDIT LOG */}
        {view === 'log' && (
          <AuditLog auditLog={auditLog} />
        )}

        {/* SEMESTER CONTROL */}
        {view === 'semester' && (
          <SemesterControl ambassadors={ambassadors} currentSemester={currentSemester}
            semesterHistory={semesterHistory} onFreeze={handleFreezeSemester}
            onReset={handleResetSemester} onUpdate={handleUpdateAmbassador} />
        )}

        {/* BACKUP */}
        {view === 'backup' && (
          <DataManager ambassadors={ambassadors} courses={courses} currentSemester={currentSemester}
            semesterHistory={semesterHistory} auditLog={auditLog} onImport={handleImport}
            lastBackup={lastBackup} onBackupNow={()=>setLastBackup(Date.now())} />
        )}
      </div>
    </div>
  );
}

// ── MOUNT THE APP ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
